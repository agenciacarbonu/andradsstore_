<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Cartão de Visita</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; padding: 50px; }
        .card { background: white; max-width: 350px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 5px; }
        p { color: #666; }
        .links a { display: block; background: #007bff; color: white; margin: 10px 0; padding: 10px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .links a:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Seu Nome</h1>
        <p>Sua Profissão / Especialidade</p>
        <hr>
        <div class="links">
            <a href="mailto:seu-email@email.com" target="_blank">E-mail</a>
            <a href="https://linkedin.com/in/seu-perfil" target="_blank">LinkedIn</a>
            <a href="https://github.com/seu-usuario" target="_blank">GitHub</a>
        </div>
    </div>

</body>
</html>
